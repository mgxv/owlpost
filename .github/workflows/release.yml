name: Release

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to build (e.g. v0.1.0)"
                required: true

permissions:
    contents: write

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        name: Build and publish
        runs-on: macos-15
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.tag || github.ref }}

            - name: Verify version consistency
              run: |
                  set -euo pipefail
                  TAG="${{ inputs.tag || github.ref_name }}"
                  VERSION=$(jq -r '.version' package.json)
                  echo "package.json : $VERSION"
                  echo "git tag      : $TAG"
                  if [[ "$TAG" != "v${VERSION}" ]]; then
                      echo "ERROR: git tag ($TAG) does not match package.json version (v${VERSION})" >&2
                      exit 1
                  fi
                  echo "Version consistent: $VERSION"

            - uses: actions/setup-node@v6
              with:
                  node-version-file: ".node-version"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Package arm64 + x64
              env:
                  CSC_LINK: ${{ secrets.CSC_LINK }}
                  CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
                  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
              run: |
                  if [[ -z "$CSC_LINK" ]]; then unset CSC_LINK CSC_KEY_PASSWORD; fi
                  # Bake the DSN into the shipped package.json; a runtime env lookup
                  # would be undefined in a GUI-launched app.
                  if [[ -n "${SENTRY_DSN:-}" ]]; then
                      npx electron-builder --mac --arm64 --x64 -c.extraMetadata.sentryDsn="$SENTRY_DSN" --publish never
                  else
                      npx electron-builder --mac --arm64 --x64 --publish never
                  fi

            - name: Verify bundle outputs
              run: |
                  set -euo pipefail
                  VERSION=$(jq -r '.version' package.json)
                  test -d release/mac-arm64/Owlpost.app                    || { echo "Missing arm64 .app"; exit 1; }
                  test -d release/mac/Owlpost.app                          || { echo "Missing x64 .app"; exit 1; }
                  test -f "release/Owlpost-${VERSION}-arm64.dmg"           || { echo "Missing arm64 .dmg"; exit 1; }
                  test -f "release/Owlpost-${VERSION}.dmg"                 || { echo "Missing x64 .dmg"; exit 1; }
                  test -f "release/Owlpost-${VERSION}-arm64-mac.zip"       || { echo "Missing arm64 .zip"; exit 1; }
                  test -f "release/Owlpost-${VERSION}-mac.zip"             || { echo "Missing x64 .zip"; exit 1; }
                  test -f release/latest-mac.yml                           || { echo "Missing latest-mac.yml"; exit 1; }
                  echo "All bundles verified."

            - name: Publish release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  TAG="${{ inputs.tag || github.ref_name }}"
                  VERSION=$(jq -r '.version' package.json)

                  if gh release view "${TAG}" >/dev/null 2>&1; then
                      gh release edit "${TAG}" \
                          --title "Owlpost ${TAG}" \
                          --notes "See commit history for changes." \
                          --draft
                  else
                      gh release create "${TAG}" \
                          --title "Owlpost ${TAG}" \
                          --notes "See commit history for changes." \
                          --draft
                  fi

                  gh release upload "${TAG}" \
                      "release/Owlpost-${VERSION}-arm64.dmg" \
                      "release/Owlpost-${VERSION}.dmg" \
                      "release/Owlpost-${VERSION}-arm64-mac.zip" \
                      "release/Owlpost-${VERSION}-mac.zip" \
                      release/latest-mac.yml \
                      --clobber
